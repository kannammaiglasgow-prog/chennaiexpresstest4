<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chennai Express Order Preview</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f6f7f8;margin:0;color:#111}
.wrap{max-width:720px;margin:auto;padding:16px}
.card{background:white;border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 4px 16px #0001}
.logo{font-size:28px;font-weight:900;color:#d10b14;font-style:italic}.logo span{color:#087a36}
h1{font-size:22px}.row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:10px 0;gap:12px}
.total{font-size:24px;color:#d10b14;font-weight:900}.muted{color:#666}.btn{display:block;background:#087a36;color:white;text-align:center;text-decoration:none;padding:14px;border-radius:12px;font-weight:900;margin-top:12px;border:0;width:100%;font-size:16px}
.item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 0;border-bottom:1px solid #eee}
.admin-panel{background:#fff8e1;border:1px solid #ffe0a3;border-radius:18px;padding:14px;margin:12px 0}
.edit-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff;border-radius:14px;padding:10px;margin:8px 0}
.qty-controls{display:flex;align-items:center;gap:6px}
.qty-controls button,.remove-btn{border:0;border-radius:8px;padding:7px 10px;font-weight:900}
.qty-controls button{background:#087a36;color:#fff}.remove-btn{background:#d10b14;color:#fff}
.free-gifts-card{border:2px solid #bfe8ce;background:#f7fff9}
.gift-row{display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center;background:#eaf7ef;border-radius:14px;padding:10px;margin:8px 0}
.gift-icon{width:52px;height:52px;border-radius:12px;background:#087a36;color:white;display:flex;align-items:center;justify-content:center;font-size:26px}
.points-box{background:white;border-radius:14px;padding:10px;margin-top:12px}
.points-box div{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee}
.notice{background:#eaf7ef;border:1px solid #bfe8ce;border-radius:14px;padding:12px;margin:12px 0;color:#085c2d}

.removed-box{background:#ffe7e8;border:1px solid #ffc1c5;border-radius:14px;padding:10px;margin:10px 0;color:#8a0008}
.removed-box h2{font-size:18px;margin:0 0 8px}
.removed-box div{padding:6px 0;border-bottom:1px solid #ffc1c5}
.removed-box div:last-child{border-bottom:0}

.timing-box{background:#eef7ff;border:1px solid #b8dcff;border-radius:14px;padding:12px;margin:12px 0}
.timing-box h2{font-size:18px;margin:0 0 8px;color:#064f8c}
.timing-box label{display:block;font-weight:900;margin-top:8px}
.timing-box input,.timing-box textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #ccc;border-radius:10px;margin-top:4px}
.timing-preview{background:#eef7ff;border:1px solid #b8dcff}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">CHENNAI <span>EXPRESS</span></div>
    <p class="muted">Food & Grocery Order Preview</p>
  </div>
  <div id="content"></div>
</div>
<script>
const STORE_WHATSAPP = "447309736428";

function money(v){ return "£" + Number(v||0).toFixed(2); }

function formatUKWhatsAppNumber(phone){
  let p = String(phone || "").replace(/[^0-9]/g,"");

  // 07309xxxxxx -> 447309xxxxxx
  if(p.startsWith("0")){
    p = "44" + p.substring(1);
  }

  // 7309xxxxxx -> 447309xxxxxx
  if(p.length === 10 && p.startsWith("7")){
    p = "44" + p;
  }

  // Already UK country code
  if(p.startsWith("44")){
    return p;
  }

  // If still no country code and looks like a UK mobile without first 0
  if(p.startsWith("7")){
    return "44" + p;
  }

  return p;
}

function readOrder(){
  try{
    const hash = decodeURIComponent(location.hash.replace("#data=",""));
    try{
      return JSON.parse(decodeURIComponent(escape(atob(hash))));
    }catch(e){
      return JSON.parse(atob(hash));
    }
  }catch(e){
    return null;
  }
}

let o = readOrder();
if(o){
  o.removedItems = o.removedItems || [];
  o.originalRewards = o.originalRewards || JSON.parse(JSON.stringify(o.rewards || []));
}

function recalc(){
  if(!o) return;
  o.removedItems = o.removedItems || [];

  // Move zero quantity items to removed/out of stock list before deleting
  (o.items || []).forEach(i=>{
    if(Number(i.qty) <= 0 && !o.removedItems.some(r => r.name === i.name)){
      o.removedItems.push({
        name: i.name,
        qty: i.originalQty || i.qty || 1,
        price: i.price,
        reason: "Out of stock / unavailable"
      });
    }
  });

  o.items = (o.items || []).filter(i => Number(i.qty) > 0);
  o.items.forEach(i => {
    if(!i.originalQty) i.originalQty = i.qty;
    i.total = Number(i.qty) * Number(i.price);
  });

  o.subtotal = o.items.reduce((s,i)=>s + Number(i.total || 0),0);
  o.total = o.subtotal + Number(o.delivery || 0);

  validateRewardsAfterEdit();
}

function validateRewardsAfterEdit(){
  if(!o) return;
  const earnedPoints = Math.floor(Number(o.subtotal || 0) * 10);
  let used = 0;
  const validRewards = [];
  const removedRewards = [];

  (o.rewards || []).forEach(r=>{
    const pts = Number(r.points || 0);
    if(used + pts <= earnedPoints){
      validRewards.push(r);
      used += pts;
    }else{
      removedRewards.push({...r, reason:"Not enough reward points after order update"});
    }
  });

  o.rewards = validRewards;
  o.removedRewards = removedRewards;
  o.rewardPointsUsed = used;
  o.rewardPointsRemaining = Math.max(0, earnedPoints - used);
}

function changeQty(index, delta){
  if(!o || !o.items[index]) return;
  o.items[index].qty = Number(o.items[index].qty || 0) + delta;
  if(o.items[index].qty < 0) o.items[index].qty = 0;
  recalc();
  render();
}

function removeItem(index){
  if(!o || !o.items[index]) return;
  const item = o.items[index];
  o.removedItems = o.removedItems || [];
  o.removedItems.push({
    name: item.name,
    qty: item.qty,
    price: item.price,
    reason: "Out of stock / unavailable"
  });
  o.items.splice(index,1);
  recalc();
  render();
}


function saveAdminTiming(){
  if(!o) return;
  const dateEl = document.getElementById("adminDate");
  const timeEl = document.getElementById("adminTime");
  const noteEl = document.getElementById("adminTimingNote");

  o.adminConfirmedDate = dateEl ? dateEl.value : "";
  o.adminConfirmedTime = timeEl ? timeEl.value : "";
  o.adminTimingNote = noteEl ? noteEl.value : "";

  if(o.type === "Collection"){
    o.collectionDate = o.adminConfirmedDate;
    o.collectionTime = o.adminConfirmedTime;
  }else{
    o.deliveryDate = o.adminConfirmedDate;
    o.deliveryTime = o.adminConfirmedTime;
  }
}

function timingLabel(){
  if(!o) return "Time";
  return o.type === "Collection" ? "Collection" : "Delivery";
}

function timingSummaryText(){
  if(!o) return "";
  const label = timingLabel();
  const date = o.type === "Collection" ? o.collectionDate : o.deliveryDate;
  const time = o.type === "Collection" ? o.collectionTime : o.deliveryTime;
  let txt = "";
  if(date || time){
    txt += `${label} Date: ${date || "To be confirmed"}\n`;
    txt += `${label} Time: ${time || "To be confirmed"}\n`;
  }else{
    txt += `${label} date/time: To be confirmed\n`;
  }
  if(o.adminTimingNote) txt += `Note: ${o.adminTimingNote}\n`;
  return txt;
}

function sendUpdatedToCustomer(){
  if(!o) return;
  saveAdminTiming();
  recalc();
  const customerPhone = formatUKWhatsAppNumber(o.phone || "");
  if(!customerPhone){
    alert("Customer WhatsApp number is missing or invalid.");
    return;
  }

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(o))));
  const link = location.href.split("order.html")[0] + "customer_order.html#data=" + encoded;

  let msg = `CHENNAI EXPRESS - UPDATED ORDER\n\n`;
  msg += `Hi ${o.name || ""}, we have reviewed your order.\n\n`;

  if((o.removedItems || []).length){
    msg += `SORRY, THESE ITEMS ARE OUT OF STOCK / UNAVAILABLE:\n`;
    (o.removedItems || []).forEach((i,idx)=>{
      msg += `${idx+1}. ${i.qty || 1} x ${i.name}\n`;
    });
    msg += `\n`;
  }

  if((o.removedRewards || []).length){
    msg += `FREE GIFT UPDATED:\n`;
    (o.removedRewards || []).forEach((r,idx)=>{
      msg += `${idx+1}. ${r.name} removed - not enough reward points after order update\n`;
    });
    msg += `\n`;
  }

  msg += `AVAILABLE ITEMS IN YOUR ORDER:\n`;
  (o.items || []).forEach((i,idx)=>{
    msg += `${idx+1}. ${i.qty} x ${i.name} = ${money(i.total)}\n`;
  });

  if((o.rewards || []).length){
    msg += `\nFREE GIFTS STILL INCLUDED:\n`;
    o.rewards.forEach((r,idx)=>{
      msg += `${idx+1}. ${r.name} - FREE (${r.points || 0} points used)\n`;
    });
  }

  if((o.requestedItems || []).length){
    msg += `\nREQUESTED ITEMS:\n`;
    o.requestedItems.forEach((r,idx)=>{
      msg += `${idx+1}. ${r} - Price to be confirmed\n`;
    });
  }

  msg += `\n${timingLabel().toUpperCase()} INFORMATION:\n`;
  msg += timingSummaryText();

  msg += `\nUPDATED SUMMARY:\n`;
  msg += `Subtotal: ${money(o.subtotal)}\n`;
  msg += `Delivery: ${o.type === "Delivery" ? "May apply / to be confirmed" : money(o.delivery || 0)}\n`;
  msg += `Total: ${money(o.total)}\n`;
  msg += `Reward Points Used: ${o.rewardPointsUsed || 0}\n`;
  msg += `Reward Points Remaining: ${o.rewardPointsRemaining || 0}\n\n`;
  msg += `Please check and confirm your updated order:\n${link}`;

  window.open(`https://wa.me/${customerPhone}?text=${encodeURIComponent(msg)}`,"_blank");
}
function confirmOrder(){
  if(!o) return;
  saveAdminTiming();
  recalc();
  const customerPhone = formatUKWhatsAppNumber(o.phone || "");
  if(!customerPhone){
    alert("Customer WhatsApp number is missing or invalid.");
    return;
  }

  let msg = `CHENNAI EXPRESS - ORDER CONFIRMED\n\n`;
  msg += `Hi ${o.name || ""}, your order has been confirmed.\n\n`;

  if((o.removedItems || []).length){
    msg += `SORRY, THESE ITEMS ARE OUT OF STOCK / UNAVAILABLE:\n`;
    o.removedItems.forEach((i,idx)=>{
      msg += `${idx+1}. ${i.qty || 1} x ${i.name}\n`;
    });
    msg += `\n`;
  }

  if((o.removedRewards || []).length){
    msg += `FREE GIFT UPDATED:\n`;
    o.removedRewards.forEach((r,idx)=>{
      msg += `${idx+1}. ${r.name} removed - not enough reward points after order update\n`;
    });
    msg += `\n`;
  }

  msg += `FINAL ITEMS:\n`;
  (o.items || []).forEach((i,idx)=>{
    msg += `${idx+1}. ${i.qty} x ${i.name} = ${money(i.total)}\n`;
  });

  if((o.rewards || []).length){
    msg += `\nFREE GIFTS:\n`;
    o.rewards.forEach((r,idx)=>{
      msg += `${idx+1}. ${r.name} - FREE (${r.points || 0} points used)\n`;
    });
  }

  msg += `\nTotal: ${money(o.total)}\n`;

  if(o.type === "Collection"){
    msg += `\nCollection Point:\n203 Willows Lane, Bolton, BL3 4AZ\n`;
    msg += `Collection time will be confirmed by WhatsApp.\n`;
  }else{
    msg += `\nDelivery charge/time will be confirmed by WhatsApp.\n`;
  }

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(o))));
  const link = location.href.split("order.html")[0] + "customer_order.html#data=" + encoded;
  msg += `\nView your order:\n${link}\n\nThank you.`;

  window.open(`https://wa.me/${customerPhone}?text=${encodeURIComponent(msg)}`,"_blank");
}
function render(){
  const el = document.getElementById("content");
  if(!o){
    el.innerHTML = "<div class='card'><h1>Order not found</h1><p>This preview link is missing order data.</p></div>";
    return;
  }
  recalc();

  el.innerHTML = `
  <div class="card">
    <h1>Order Details</h1>
    <div class="row"><span>Customer</span><b>${o.name || ""}</b></div>
    <div class="row"><span>WhatsApp</span><b>${o.phone || ""}</b></div>
    <div class="row"><span>Order Type</span><b>${o.type || ""}</b></div>
    ${o.postcode ? `<div class="row"><span>Postcode</span><b>${o.postcode}</b></div>` : ""}
    ${o.address ? `<div class="row"><span>Address</span><b>${o.address}</b></div>` : ""}
  </div>

  <div class="admin-panel">
    <h1>Admin Edit Order</h1>
    <p class="muted">If an item is unavailable, change quantity or remove it, then send the updated order link to customer.</p>
    <div class="timing-box">
      <h2>${timingLabel()} Date & Time</h2>
      <label>${timingLabel()} Date</label>
      <input id="adminDate" type="date" value="${o.type === "Collection" ? (o.collectionDate || "") : (o.deliveryDate || "")}">
      <label>${timingLabel()} Time</label>
      <input id="adminTime" type="time" value="${o.type === "Collection" ? (o.collectionTime || "") : (o.deliveryTime || "")}">
      <label>Note optional</label>
      <textarea id="adminTimingNote" placeholder="Example: Please collect after 6 PM">${o.adminTimingNote || ""}</textarea>
    </div>
    ${(o.items || []).map((i,idx)=>`
      <div class="edit-item">
        <div><b>${i.name}</b><br><small>${money(i.price)} each</small></div>
        <div>
          <div class="qty-controls">
            <button onclick="changeQty(${idx},-1)">−</button>
            <b>${i.qty}</b>
            <button onclick="changeQty(${idx},1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(${idx})">Remove</button>
        </div>
      </div>
    `).join("")}
    ${(o.removedItems || []).length ? `<div class="removed-box"><h2>Removed / Out of Stock Items</h2>${o.removedItems.map(i=>`<div><b>${i.qty || 1} x ${i.name}</b><br><small>${i.reason || "Unavailable"}</small></div>`).join("")}</div>` : ""}
    ${(o.removedRewards || []).length ? `<div class="removed-box"><h2>Removed Free Gifts</h2>${o.removedRewards.map(r=>`<div><b>${r.name}</b><br><small>${r.reason}</small></div>`).join("")}</div>` : ""}
    <button class="btn" onclick="sendUpdatedToCustomer()">Send Read-Only Invoice to Customer</button>
    <button class="btn" onclick="confirmOrder()" style="background:#111">Confirm Order</button>
  </div>

  <div class="card timing-preview">
    <h1>${timingLabel()} Information</h1>
    <div class="row"><span>${timingLabel()} Date</span><b>${(o.type === "Collection" ? o.collectionDate : o.deliveryDate) || "To be confirmed"}</b></div>
    <div class="row"><span>${timingLabel()} Time</span><b>${(o.type === "Collection" ? o.collectionTime : o.deliveryTime) || "To be confirmed"}</b></div>
    ${o.adminTimingNote ? `<p><b>Note:</b> ${o.adminTimingNote}</p>` : ""}
  </div>

  <div class="card">
    <h1>Paid Items</h1>
    ${(o.items || []).map(i=>`<div class="item"><div><b>${i.qty} x ${i.name}</b><br><span class="muted">${money(i.price)} each</span></div><b>${money(i.total)}</b></div>`).join("") || "<p>No paid items.</p>"}
    ${(o.requestedItems||[]).length ? `<h2>Requested Items</h2>` + o.requestedItems.map(i=>`<div class="item"><div><b>${i}</b><br><span class="muted">Price to be confirmed</span></div><b>TBC</b></div>`).join("") : ""}
  </div>

  ${(o.rewards||[]).length ? `<div class="card free-gifts-card">
    <h1>🎁 Free Gifts Claimed</h1>
    ${o.rewards.map(r=>`<div class="gift-row"><div class="gift-icon">${r.emoji || "🎁"}</div><div><b>${r.name}</b><br><span>${r.points || 0} points used</span></div><b>FREE</b></div>`).join("")}
    <div class="points-box">
      <div><span>Reward Points Used</span><b>${o.rewardPointsUsed || (o.rewards||[]).reduce((s,r)=>s+(r.points||0),0)}</b></div>
      <div><span>Reward Points Remaining</span><b>${o.rewardPointsRemaining || 0}</b></div>
    </div>
  </div>` : ""}

  <div class="card">
    <div class="row"><span>Subtotal</span><b>${money(o.subtotal)}</b></div>
    <div class="row"><span>Delivery</span><b>${o.type === "Delivery" ? "May apply / to be confirmed" : money(o.delivery || 0)}</b></div>
    <div class="row total"><span>Total</span><span>${money(o.total)}</span></div>
    <p><b>Payment:</b> ${o.paymentMethod || "Cash/Card on Collection or Delivery"}</p>
    ${o.notes ? `<p><b>Notes:</b> ${o.notes}</p>` : ""}
  </div>

  <div class="notice">
    Customer can confirm the updated order after receiving this link on WhatsApp.
  </div>
  `;
}

render();
</script>
</body>
</html>
